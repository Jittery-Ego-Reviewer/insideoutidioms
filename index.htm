<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情緒成語大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans HK', sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            overflow: hidden; /* Prevent pull-to-refresh on mobile */
        }

        /* WhatsApp Theme Colors */
        :root {
            --wa-teal: #075e54;
            --wa-light-teal: #128c7e;
            --wa-bg: #efe7dd;
            --wa-bubble-in: #ffffff;
            --wa-bubble-out: #dcf8c6;
        }

        /* Chat Background Pattern */
        .chat-bg {
            background-color: var(--wa-bg);
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23000000' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* Bubble Styles */
        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 1.125rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .bubble-in {
            background-color: var(--wa-bubble-in);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .bubble-in::before {
            content: '';
            position: absolute;
            top: 0;
            left: -10px;
            width: 0;
            height: 0;
            border-top: 10px solid var(--wa-bubble-in);
            border-left: 10px solid transparent;
        }

        .bubble-out {
            background-color: var(--wa-bubble-out);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .bubble-out::before {
            content: '';
            position: absolute;
            top: 0;
            right: -10px;
            width: 0;
            height: 0;
            border-top: 10px solid var(--wa-bubble-out);
            border-right: 10px solid transparent;
        }

        .emoji-text {
            font-size: 2.5rem;
            letter-spacing: 0.2rem;
            text-align: center;
            display: block;
            margin: 5px 0;
        }

        /* Character Button Colors */
        .char-joy { background-color: #FDE047; color: #854D0E; }
        .char-sadness { background-color: #93C5FD; color: #1E3A8A; }
        .char-anger { background-color: #FCA5A5; color: #7F1D1D; }
        .char-fear { background-color: #D8B4FE; color: #4C1D95; }
        .char-disgust { background-color: #86EFAC; color: #14532D; }
        .char-anxiety { background-color: #FDBA74; color: #7C2D12; }
        .char-envy { background-color: #5EEAD4; color: #134E4A; }
        .char-ennui { background-color: #94A3B8; color: #1E293B; }
        .char-embarrassment { background-color: #F9A8D4; color: #831843; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Custom Scrollbar for chat */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 10px; }

        /* Timer Bar */
        .timer-bar {
            transition: width 1s linear;
        }

        /* 大螢幕自動等比例放大 (Auto-scale for large screens) */
        @media (min-width: 768px) and (min-height: 700px) { html { font-size: 18px; } }
        @media (min-width: 1024px) and (min-height: 800px) { html { font-size: 20px; } }
        @media (min-width: 1280px) and (min-height: 900px) { html { font-size: 24px; } }
        @media (min-width: 1536px) and (min-height: 1000px) { html { font-size: 28px; } }
    </style>
</head>
<body class="flex justify-center items-center h-screen">

    <!-- App Container -->
    <div class="w-full max-w-md h-full sm:h-[95vh] bg-white sm:rounded-[2rem] sm:shadow-2xl overflow-hidden flex flex-col relative border-4 border-gray-800">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="absolute inset-0 z-50 flex flex-col justify-center items-center p-4 text-center chat-bg overflow-y-auto">
            <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-lg border-2 border-[var(--wa-light-teal)] w-full max-h-full flex flex-col">
                <div class="text-4xl sm:text-5xl mb-2 sm:mb-4 shrink-0">🧠📱</div>
                <h1 class="text-xl sm:text-2xl font-bold text-gray-800 mb-1 sm:mb-2 shrink-0">情緒成語大挑戰</h1>
                <h2 class="text-sm sm:text-md text-[var(--wa-teal)] font-bold mb-3 sm:mb-4 shrink-0">Inside Out x WhatsApp 篇</h2>
                
                <div class="text-left text-gray-700 space-y-2 sm:space-y-3 mb-4 sm:mb-6 bg-gray-50 p-3 sm:p-4 rounded-lg text-xs sm:text-sm overflow-y-auto">
                    <p>🎯 <strong>目標：</strong>看 Emoji 猜出描述情緒的成語，並找出對應的腦朋友！</p>
                    <p>🎮 <strong>玩法：</strong></p>
                    <ol class="list-decimal pl-5 space-y-1">
                        <li>系統會發送 4 個 Emoji 密碼。</li>
                        <li>你有 45 秒可以思考。</li>
                        <li>時間到（或按鈕）後會出現 3 個成語選項。</li>
                        <li>選出正確成語後，再猜猜是哪個角色的心聲！</li>
                    </ol>
                    <div class="mt-4 pt-3 border-t border-gray-200">
                        <p class="text-center font-bold text-gray-700 mb-2">請選擇回合數量：</p>
                        <div class="flex justify-center gap-2">
                            <button id="btn-round-5" onclick="setRounds(5)" class="round-btn px-4 py-2 rounded-lg border-2 border-[var(--wa-light-teal)] bg-white text-[var(--wa-light-teal)] font-bold active:scale-95 transition">5 回合</button>
                            <button id="btn-round-10" onclick="setRounds(10)" class="round-btn px-4 py-2 rounded-lg border-2 border-[var(--wa-light-teal)] bg-[var(--wa-light-teal)] text-white font-bold active:scale-95 transition">10 回合</button>
                            <button id="btn-round-19" onclick="setRounds(19)" class="round-btn px-4 py-2 rounded-lg border-2 border-[var(--wa-light-teal)] bg-white text-[var(--wa-light-teal)] font-bold active:scale-95 transition">全部 (19)</button>
                        </div>
                    </div>
                </div>
                
                <button onclick="startGame()" class="w-full bg-[var(--wa-light-teal)] hover:bg-[var(--wa-teal)] text-white font-bold py-3 sm:py-4 px-8 rounded-xl text-lg sm:text-xl shadow-md transform transition active:scale-95 shrink-0">
                    開始遊戲
                </button>
            </div>
        </div>

        <!-- HEADER -->
        <div class="bg-[var(--wa-teal)] text-white p-3 flex items-center shadow-md z-10 relative">
            <div class="w-10 h-10 bg-white rounded-full flex justify-center items-center text-2xl mr-3 overflow-hidden">
                🤖
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-lg leading-tight">成語小導師</h2>
                <p class="text-xs text-green-200">在線 · 第 <span id="round-display">1</span>/<span id="total-rounds-display">10</span> 回合</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-white opacity-80">分數</p>
                <p id="score-display" class="font-bold text-xl text-yellow-300">0</p>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col chat-bg relative">
            <!-- Messages will be injected here -->
        </div>

        <!-- TIMER BAR -->
        <div id="timer-container" class="h-1.5 w-full bg-gray-200 hidden">
            <div id="timer-bar" class="h-full bg-[var(--wa-light-teal)] w-full timer-bar"></div>
        </div>

        <!-- CONTROLS AREA (Input panel) -->
        <div id="controls-area" class="bg-gray-100 p-3 border-t border-gray-300 min-h-[100px] flex items-center justify-center">
            
            <!-- Default thinking state -->
            <div id="panel-thinking" class="w-full hidden">
                <p class="text-center text-sm text-gray-500 mb-2">正在思考中... (剩餘 <span id="time-left">45</span> 秒)</p>
                <button onclick="skipTimer()" class="w-full bg-white border-2 border-[var(--wa-light-teal)] text-[var(--wa-light-teal)] font-bold py-3 rounded-xl hover:bg-gray-50 transition active:scale-95">
                    我需要選項提示 💡
                </button>
            </div>

            <!-- Idiom Selection State -->
            <div id="panel-idioms" class="w-full hidden grid-cols-1 gap-2">
                <!-- Buttons injected via JS -->
            </div>

            <!-- Character Selection State -->
            <div id="panel-characters" class="w-full hidden">
                <p class="text-center text-sm font-bold text-gray-700 mb-2">誰會說這句話？</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="checkCharacter('阿樂')" class="char-joy font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿樂 😀</button>
                    <button onclick="checkCharacter('阿愁')" class="char-sadness font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿愁 😢</button>
                    <button onclick="checkCharacter('阿燥')" class="char-anger font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿燥 😡</button>
                    <button onclick="checkCharacter('阿驚')" class="char-fear font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿驚 😱</button>
                    <button onclick="checkCharacter('阿憎')" class="char-disgust font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿憎 🤢</button>
                    <button onclick="checkCharacter('阿焦')" class="char-anxiety font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿焦 🫨</button>
                    <button onclick="checkCharacter('阿羨')" class="char-envy font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿羨 🥺</button>
                    <button onclick="checkCharacter('阿厭')" class="char-ennui font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿厭 😒</button>
                    <button onclick="checkCharacter('阿尷')" class="char-embarrassment font-bold py-2 rounded-lg shadow-sm border border-black/10 active:scale-95 transition">阿尷 😳</button>
                </div>
            </div>

            <!-- Next Round State -->
            <div id="panel-next" class="w-full hidden">
                <button onclick="startNextRound()" class="w-full bg-[var(--wa-teal)] text-white font-bold py-4 rounded-xl shadow-md text-lg active:scale-95 transition pop">
                    進入下一回合 ➡️
                </button>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="absolute inset-0 bg-white z-50 hidden flex-col justify-center items-center p-6 text-center chat-bg">
            <div class="bg-white p-8 rounded-2xl shadow-lg border-2 border-[var(--wa-light-teal)] w-full max-w-sm">
                <div class="text-6xl mb-4">🏆</div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">遊戲完成！</h1>
                <p class="text-gray-600 mb-6">你總共獲得了</p>
                
                <div class="text-5xl font-extrabold text-yellow-500 mb-2 flex justify-center items-center gap-2">
                    <span id="final-score">0</span> <span class="text-4xl">🌟</span>
                </div>
                
                <p id="feedback-message" class="text-lg font-bold text-[var(--wa-teal)] mb-8 bg-green-50 p-3 rounded-lg">
                    太棒了！你已經是情緒成語大師！
                </p>
                
                <button onclick="location.reload()" class="w-full bg-[var(--wa-light-teal)] hover:bg-[var(--wa-teal)] text-white font-bold py-4 px-8 rounded-xl text-xl shadow-md transform transition active:scale-95">
                    再次挑戰
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- DATA ---
        const allIdiomsData = [
            { idiom: "心花怒放", emojis: "❤️ 🌸 😡 🎇", meaning: "心裡像花開一樣快樂，充滿喜悅。", char: "阿樂" },
            { idiom: "歡天喜地", emojis: "😀 🌤️ 🎊 🌍", meaning: "形容非常高興，好像天地都在歡喜。", char: "阿樂" },
            { idiom: "笑口常開", emojis: "😀 👄 🌸 🔓", meaning: "總是笑容滿面，心情愉快。", char: "阿樂" },
            { idiom: "眉飛色舞", emojis: "🤨 🕊 🎨 💃", meaning: "眉眼生動，神采飛揚，形容非常高興。", char: "阿樂" },
            { idiom: "愁眉苦臉", emojis: "😞 🤨 😣 🙂", meaning: "眉頭緊皺，臉上充滿憂愁。", char: "阿愁" },
            { idiom: "悶悶不樂", emojis: "😒 😒 🙅 😀", meaning: "心情鬱悶，不快樂。", char: "阿愁" }, // Can also be Ennui, mapping to primary
            { idiom: "痛哭流涕", emojis: "😭 😢 💧 🤧", meaning: "大聲哭泣，眼淚鼻涕直流。", char: "阿愁" },
            { idiom: "心驚膽戰", emojis: "❤️ 😱 💡 ⚔", meaning: "心裡害怕，膽子發抖。", char: "阿驚" },
            { idiom: "提心吊膽", emojis: "🧳 ❤️ 🏗 💡", meaning: "心懸著，膽子吊著，形容非常擔心。", char: "阿驚" },
            { idiom: "坐立不安", emojis: "🧘🏻‍♀️ 🧍🏻‍♀️ 🙅🏻 😮‍💨", meaning: "焦急到不能安靜坐下。", char: "阿焦" },
            { idiom: "心慌意亂", emojis: "❤️ 🫨 🔀 🌀", meaning: "心裡慌張，思緒混亂。", char: "阿焦" },
            { idiom: "嗤之以鼻", emojis: "😤 ➡️ ✋ 👃", meaning: "用鼻子冷笑，表示不屑。", char: "阿憎" },
            { idiom: "怒氣沖天", emojis: "😡 💨 🚀 ⛅", meaning: "怒氣衝上天際，形容非常生氣。", char: "阿燥" },
            { idiom: "火冒三丈", emojis: "🔥 💨 3️⃣ 📏", meaning: "形容怒火衝天，非常憤怒。", char: "阿燥" },
            { idiom: "怒火中燒", emojis: "😡 🔥 🀄 ❤️‍🔥", meaning: "心裡充滿怒火，像在燃燒。", char: "阿燥" },
            { idiom: "面紅耳赤", emojis: "🙂 🔴 👂 🔴", meaning: "因尷尬或緊張而臉紅耳赤。", char: "阿尷" },
            { idiom: "爭風吃醋", emojis: "🤼🏻 🌬️ 😋 🍶", meaning: "因嫉妒而爭吵，形容吃醋。", char: "阿羨" },
            { idiom: "無地自容", emojis: "🈚 🌍 💁🏻 💆", meaning: "羞愧到沒有地方可以藏身。", char: "阿尷" },
            { idiom: "百無聊賴", emojis: "💯 🙅🏻 🗣️ 🧑🏻‍🦯", meaning: "形容精神上沒有依托，非常無聊。", char: "阿厭" }
        ];

        // --- GAME STATE ---
        let gameData = [];
        let currentRound = 0;
        let totalRounds = 10;
        let score = 0;
        let timerInterval;
        let timeRemaining = 45;
        let currentQuestion = null;

        // --- ROUND SELECTION ---
        function setRounds(num) {
            totalRounds = num;
            document.querySelectorAll('.round-btn').forEach(btn => {
                btn.classList.remove('bg-[var(--wa-light-teal)]', 'text-white');
                btn.classList.add('bg-white', 'text-[var(--wa-light-teal)]');
            });
            const selectedBtn = document.getElementById(`btn-round-${num}`);
            if (selectedBtn) {
                selectedBtn.classList.remove('bg-white', 'text-[var(--wa-light-teal)]');
                selectedBtn.classList.add('bg-[var(--wa-light-teal)]', 'text-white');
            }
        }

        // --- AUDIO SYNTHESIS (Self-contained, no external files) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                // Happy chime
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'wrong') {
                // Low boop
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'msg') {
                // WhatsApp pop sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- UTILS ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat-container');
            setTimeout(() => {
                chat.scrollTop = chat.scrollHeight;
            }, 50);
        }

        function hideAllPanels() {
            document.getElementById('panel-thinking').classList.add('hidden');
            document.getElementById('panel-idioms').classList.add('hidden');
            document.getElementById('panel-idioms').classList.remove('grid');
            document.getElementById('panel-characters').classList.add('hidden');
            document.getElementById('panel-next').classList.add('hidden');
            document.getElementById('timer-container').classList.add('hidden');
        }

        // --- UI UPDATES ---
        function addMessage(text, type = 'in', isEmoji = false) {
            const chat = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            
            msgDiv.className = `bubble ${type === 'in' ? 'bubble-in' : 'bubble-out'}`;
            
            if (isEmoji) {
                msgDiv.innerHTML = `<span class="emoji-text">${text}</span>`;
            } else {
                msgDiv.innerText = text;
            }

            chat.appendChild(msgDiv);
            if(type === 'in') playSound('msg');
            scrollToBottom();
        }

        // --- GAME LOGIC ---
        function startGame() {
            initAudio(); // Required on first user interaction
            document.getElementById('start-screen').classList.add('hidden');
            
            // Select random idioms based on chosen totalRounds
            gameData = shuffleArray([...allIdiomsData]).slice(0, totalRounds);
            currentRound = 0;
            score = 0;
            document.getElementById('score-display').innerText = score;
            document.getElementById('total-rounds-display').innerText = totalRounds;
            
            startNextRound();
        }

        function startNextRound() {
            if (currentRound >= totalRounds) {
                showEndScreen();
                return;
            }

            currentQuestion = gameData[currentRound];
            currentRound++;
            document.getElementById('round-display').innerText = currentRound;
            
            // 每回合自動清除對話，確保大螢幕玩家不需要往下滑動
            const chat = document.getElementById('chat-container');
            chat.innerHTML = '';
            
            hideAllPanels();
            
            // System message for round start
            const roundPill = document.createElement('div');
            roundPill.className = 'bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded-full self-center my-3 shadow-sm';
            roundPill.innerText = `第 ${currentRound} 回合`;
            chat.appendChild(roundPill);

            setTimeout(() => {
                addMessage("請根據以下 Emoji 猜出成語：", 'in');
                
                setTimeout(() => {
                    addMessage(currentQuestion.emojis, 'in', true);
                    startTimer();
                }, 800);
            }, 500);
        }

        function startTimer() {
            hideAllPanels();
            const panel = document.getElementById('panel-thinking');
            const timerContainer = document.getElementById('timer-container');
            const timerBar = document.getElementById('timer-bar');
            
            panel.classList.remove('hidden');
            timerContainer.classList.remove('hidden');
            
            timeRemaining = 45;
            document.getElementById('time-left').innerText = timeRemaining;
            
            // Reset bar instantly
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            
            // Force reflow
            void timerBar.offsetWidth;
            
            // Start transition
            timerBar.style.transition = 'width 1s linear';

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('time-left').innerText = timeRemaining;
                timerBar.style.width = `${(timeRemaining / 45) * 100}%`;

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    skipTimer();
                }
            }, 1000);
        }

        function skipTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-container').classList.add('hidden');
            showIdiomChoices();
        }

        function showIdiomChoices() {
            hideAllPanels();
            addMessage("請選擇正確的成語：", 'in');

            // Generate distractors
            let choices = [currentQuestion.idiom];
            let otherIdioms = allIdiomsData.filter(item => item.idiom !== currentQuestion.idiom);
            otherIdioms = shuffleArray(otherIdioms);
            choices.push(otherIdioms[0].idiom);
            choices.push(otherIdioms[1].idiom);
            choices = shuffleArray(choices);

            const panel = document.getElementById('panel-idioms');
            panel.innerHTML = '';
            
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-white border border-gray-300 rounded-xl py-3 text-lg font-bold text-gray-800 shadow-sm active:scale-95 transition mb-2';
                btn.innerText = choice;
                btn.onclick = () => checkIdiom(choice, btn);
                panel.appendChild(btn);
            });

            panel.classList.remove('hidden');
            panel.classList.add('grid');
        }

        function checkIdiom(selected, btnElement) {
            // Disable all buttons to prevent multiple clicks
            const buttons = document.getElementById('panel-idioms').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            addMessage(selected, 'out');

            setTimeout(() => {
                if (selected === currentQuestion.idiom) {
                    playSound('correct');
                    btnElement.classList.remove('border-gray-300', 'bg-white');
                    btnElement.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                    
                    addMessage(`✅ 答對了！\n\n【${currentQuestion.idiom}】\n意思：${currentQuestion.meaning}`, 'in');
                    
                    setTimeout(showCharacterPhase, 1500);
                } else {
                    playSound('wrong');
                    btnElement.classList.remove('border-gray-300', 'bg-white');
                    btnElement.classList.add('bg-red-100', 'border-red-500', 'text-red-800', 'shake');
                    
                    addMessage("❌ 不太對喔，再試試看！", 'in');
                    
                    // Re-enable buttons after a short delay
                    setTimeout(() => {
                        btnElement.classList.remove('bg-red-100', 'border-red-500', 'text-red-800', 'shake');
                        btnElement.classList.add('border-gray-300', 'bg-white');
                        buttons.forEach(b => b.disabled = false);
                    }, 1000);
                }
            }, 500);
        }

        function showCharacterPhase() {
            hideAllPanels();
            addMessage("那麼，你覺得這是哪個角色的心情/語氣？", 'in');
            
            setTimeout(() => {
                document.getElementById('panel-characters').classList.remove('hidden');
                scrollToBottom();
            }, 500);
        }

        function checkCharacter(selectedChar) {
            addMessage(selectedChar, 'out');
            hideAllPanels(); // prevent clicking again immediately

            setTimeout(() => {
                if (selectedChar === currentQuestion.char) {
                    playSound('correct');
                    score++;
                    document.getElementById('score-display').innerText = score;
                    
                    addMessage(`🎉 完全正確！這正是 ${currentQuestion.char} 的表現！獲得 1 🌟`, 'in');
                    
                    setTimeout(() => {
                        document.getElementById('panel-next').classList.remove('hidden');
                        scrollToBottom();
                    }, 1000);
                } else {
                    playSound('wrong');
                    addMessage(`🤔 好像不太像 ${selectedChar} 呢...\n正確答案是：${currentQuestion.char}！`, 'in');
                    
                    setTimeout(() => {
                        document.getElementById('panel-next').classList.remove('hidden');
                        scrollToBottom();
                    }, 1500);
                }
            }, 500);
        }

        function showEndScreen() {
            playSound('correct'); // final cheer
            setTimeout(() => playSound('correct'), 300);
            
            document.getElementById('final-score').innerText = score;
            const msg = document.getElementById('feedback-message');
            
            const percentage = score / totalRounds;
            
            if (score === totalRounds) {
                msg.innerText = "太完美了！你是情緒成語大師！🏆";
            } else if (percentage >= 0.7) {
                msg.innerText = "非常棒！你掌握了大部分的成語！👍";
            } else if (percentage >= 0.4) {
                msg.innerText = "做得好！繼續努力會更進步！💪";
            } else {
                msg.innerText = "完成挑戰！多練習幾次會越來越熟練喔！😊";
            }

            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');
        }

    </script>
</body>
</html>
